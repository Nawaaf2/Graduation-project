<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>الإعدادات | مفكرة المصاريف</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">

      <h1 class="page-title plain" style="margin-bottom:28px">⚙️ الإعدادات</h1>
      <div id="success-msg" class="success-msg"></div>

      <div class="setting-row"><span class="setting-label">الاسم</span><span class="setting-value" id="s-name">—</span></div>
      <div class="setting-row"><span class="setting-label">البريد الإلكتروني</span><span class="setting-value" id="s-email">—</span></div>
      <div class="setting-row"><span class="setting-label">العملة</span><span class="setting-value">ريال سعودي (ر.س)</span></div>
      <div class="setting-row">
        <span class="setting-label">المظهر</span>
        <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme();updateBtn()">—</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-export" onclick="doExportExp()">📥 تصدير المصاريف</button>
        <button class="btn-export" onclick="doExportInc()">📥 تصدير الدخل</button>
      </div>

      <div style="margin-top:36px;padding-top:20px;border-top:1px solid var(--border)">
        <h3 style="margin-bottom:16px;color:var(--text-2);font-size:15px">⚠️ منطقة الخطر</h3>
        <button class="btn-outline" onclick="doLogout()" style="color:var(--red);border-color:rgba(239,68,68,0.4)">🚪 تسجيل الخروج</button>
      </div>

    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/settings.js"></script>
</body>
</html>
