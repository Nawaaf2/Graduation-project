<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>إنشاء حساب | مفكرة المصاريف</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:28px">
        <h1 class="auth-title">إنشاء حساب جديد</h1>
        <p class="auth-sub">ابدأ بتتبع مصاريفك اليوم</p>
      </div>
      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group"><label class="form-label">الاسم الكامل</label><input type="text" class="form-input" id="name" placeholder="محمد أحمد"></div>
        <div class="form-group"><label class="form-label">البريد الإلكتروني</label><input type="email" class="form-input" id="email" placeholder="example@email.com"></div>
        <div class="form-group"><label class="form-label">كلمة المرور</label><input type="password" class="form-input" id="password" placeholder="••••••••"></div>
        <div class="form-group"><label class="form-label">تأكيد كلمة المرور</label><input type="password" class="form-input" id="confirm" placeholder="••••••••"></div>
        <button class="btn btn-green btn-full" id="reg-btn" onclick="doRegister()">إنشاء الحساب</button>
      </div>
      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-3)">
        عندك حساب؟ <a href="login.html" class="link">سجّل دخول</a>
      </p>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/register.js"></script>
</body>
</html>
