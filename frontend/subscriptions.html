<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>الاشتراكات | مفكرة المصاريف</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">

      <div class="page-header">
        <div><h1 class="page-title plain">🔄 الاشتراكات</h1><p class="page-sub">إدارة اشتراكاتك الشهرية والسنوية</p></div>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-header"><span class="stat-label">إجمالي شهري</span><div class="stat-icon">🔄</div></div><div class="stat-value" id="s-monthly">—</div></div>
        <div class="stat-card"><div class="stat-header"><span class="stat-label">إجمالي سنوي</span><div class="stat-icon">📅</div></div><div class="stat-value" id="s-yearly">—</div></div>
        <div class="stat-card"><div class="stat-header"><span class="stat-label">تجديد قريب</span><div class="stat-icon">🔔</div></div><div class="stat-value" id="s-due">—</div><div class="stat-sub">خلال 7 أيام</div></div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-size:16px">قائمة الاشتراكات</h3>
        <button class="btn btn-accent" onclick="openModal('add-modal')">+ اشتراك جديد</button>
      </div>

      <div id="subs-list"><p style="color:var(--text-3)">جاري التحميل...</p></div>

    </main>
  </div>

  <div id="add-modal" class="modal-overlay hidden"><div class="modal-card">
    <h3 class="modal-title">إضافة اشتراك جديد</h3>
    <div class="form-group"><label class="form-label">اسم الاشتراك</label><input type="text" class="form-input" id="s-name" placeholder="مثال: Netflix"></div>
    <div class="form-group"><label class="form-label">الأيقونة</label><input type="text" class="form-input" id="s-icon" placeholder="📺"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">المبلغ (ر.س)</label><input type="number" class="form-input" id="s-amount" placeholder="29.99"></div>
      <div class="form-group"><label class="form-label">دورة الدفع</label>
        <select class="form-select" id="s-cycle">
          <option value="monthly">شهري</option>
          <option value="yearly">سنوي</option>
          <option value="weekly">أسبوعي</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">تاريخ التجديد القادم</label><input type="date" class="form-input" id="s-renewal"></div>
    <button class="btn btn-green btn-full" onclick="addSub()">حفظ الاشتراك</button>
    <button class="btn btn-outline btn-full" style="margin-top:8px" onclick="closeModal('add-modal')">إلغاء</button>
  </div></div>

  <div id="edit-modal" class="modal-overlay hidden"><div class="modal-card">
    <h3 class="modal-title">تعديل الاشتراك</h3>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label class="form-label">اسم الاشتراك</label><input type="text" class="form-input" id="edit-name"></div>
    <div class="form-group"><label class="form-label">الأيقونة</label><input type="text" class="form-input" id="edit-icon"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">المبلغ</label><input type="number" class="form-input" id="edit-amount"></div>
      <div class="form-group"><label class="form-label">دورة الدفع</label>
        <select class="form-select" id="edit-cycle">
          <option value="monthly">شهري</option>
          <option value="yearly">سنوي</option>
          <option value="weekly">أسبوعي</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">تاريخ التجديد</label><input type="date" class="form-input" id="edit-renewal"></div>
    <button class="btn btn-accent btn-full" onclick="saveEdit()">حفظ التعديل</button>
    <button class="btn btn-outline btn-full" style="margin-top:8px" onclick="closeModal('edit-modal')">إلغاء</button>
  </div></div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/subscriptions.js"></script>
</body>
</html>
