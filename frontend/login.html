<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>تسجيل الدخول | مفكرة المصاريف</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:32px">
        <div class="auth-logo">💰</div>
        <h1 class="auth-title">مُفكّرة المصاريف</h1>
        <p class="auth-sub">سجّل مصاريفك وتابع ميزانيتك</p>
      </div>
      <div id="error-msg" class="error-msg"></div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-input" id="email" placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••">
        </div>
        <button class="btn btn-accent btn-full" id="login-btn" onclick="doLogin()">تسجيل الدخول</button>
      </div>
      <p style="text-align:center;margin-top:22px;font-size:14px;color:var(--text-3)">
        ما عندك حساب؟ <a href="register.html" class="link">سجّل الآن</a>
      </p>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
