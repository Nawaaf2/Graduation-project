<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>التصنيفات | مفكرة المصاريف</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">

      <div class="page-header">
        <div><h1 class="page-title">📁 التصنيفات</h1><p class="page-sub">إدارة تصنيفات المصاريف</p></div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <span style="font-size:14px;color:var(--text-3)">إجمالي: <strong id="total-c" style="color:var(--text-1)">—</strong> تصنيف</span>
        <button class="btn btn-outline" onclick="toggleForm()">+ تصنيف جديد</button>
      </div>

      <div id="add-form" class="card" style="display:none;margin-bottom:20px">
        <h3 style="margin-bottom:14px;font-size:16px">إضافة تصنيف جديد</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
          <div class="form-group" style="margin:0;flex:2;min-width:140px"><label class="form-label">اسم التصنيف</label><input type="text" class="form-input" id="c-name" placeholder="مثال: قهوة"></div>
          <div class="form-group" style="margin:0;width:90px"><label class="form-label">الأيقونة</label><input type="text" class="form-input" id="c-icon" placeholder="☕"></div>
          <div class="form-group" style="margin:0;width:90px"><label class="form-label">اللون</label><input type="color" class="form-input" id="c-color" value="#6366f1" style="padding:6px;height:44px;cursor:pointer"></div>
          <button class="btn btn-accent" onclick="addCat()">إضافة</button>
        </div>
      </div>

      <div class="cats-grid" id="cats-grid"><p style="color:var(--text-3)">جاري التحميل...</p></div>

    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/categories.js"></script>
</body>
</html>
