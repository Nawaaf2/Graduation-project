<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>التقارير | مفكرة المصاريف</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">

      <div class="page-header">
        <div><h1 class="page-title plain">📈 التقارير</h1><p class="page-sub">تحليل شامل لمصاريفك</p></div>
        <button class="btn-export" onclick="doExport()">📥 تصدير</button>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-header"><span class="stat-label">إجمالي الدخل</span><div class="stat-icon">💰</div></div><div class="stat-value" id="r-income">—</div></div>
        <div class="stat-card"><div class="stat-header"><span class="stat-label">إجمالي المصاريف</span><div class="stat-icon">💸</div></div><div class="stat-value" id="r-exp">—</div></div>
        <div class="stat-card"><div class="stat-header"><span class="stat-label">صافي الادخار</span><div class="stat-icon">💎</div></div><div class="stat-value" id="r-balance">—</div></div>
      </div>

      <div class="chart-card">
        <h3>📊 المصروفات حسب التصنيف</h3>
        <div id="bar-chart"><p style="color:var(--text-3)">جاري التحميل...</p></div>
      </div>

      <div class="chart-card">
        <h3>📅 المصروفات الشهرية</h3>
        <canvas id="line-chart" width="600" height="180" style="max-width:100%"></canvas>
      </div>

    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/reports.js"></script>
</body>
</html>
