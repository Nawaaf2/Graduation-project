# ===== قاعدة البيانات =====
spring.datasource.url=jdbc:postgresql://localhost:5432/mufakkira_db
spring.datasource.username=mufakkira_user
spring.datasource.password=mufakkira_pass_2024
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
