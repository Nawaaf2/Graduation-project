# ===== قاعدة البيانات =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mufakkira_db}
spring.datasource.username=${DB_USERNAME:mufakkira_user}
spring.datasource.password=${DB_PASSWORD:mufakkira_pass_2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== السيرفر =====
server.port=8080

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:mufakkira_secret_key_2024_very_long_string_for_security}
app.jwt.expiration=86400000

# ===== CORS — يسمح للـ Frontend يتكلم مع الـ Backend =====
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500
